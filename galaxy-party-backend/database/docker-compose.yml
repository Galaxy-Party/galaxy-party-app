services:
  postgres:
    image: postgres:17
    container_name: galaxy-party
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /data/postgres
    volumes:
      - galaxy_party_data:/data/postgres
    ports:
      - "5432:5432"

volumes:
  galaxy_party_data: