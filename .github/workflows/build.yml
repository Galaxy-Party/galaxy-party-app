name: Build

on:
  pull_request:
    branches:
      - 'main'
      - 'dev'

jobs:
  build_back:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: galaxy-party-backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'corretto'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn --batch-mode clean test -Dspring.profiles.active=test

  build_front:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: galaxy-party-frontend

    steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: 24
            cache: 'npm'
            cache-dependency-path: galaxy-party-frontend/package-lock.json

        - name: Install dependencies
          run: npm ci

        - name: Run ESLint
          run: npm run lint

        - name: Build project
          run: npm run build

  build_websocket:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: galaxy-party-websocket

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: galaxy-party-websocket/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build
